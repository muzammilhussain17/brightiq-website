<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <!-- Shield icon -->
  <g transform="translate(10, 8)">
    <!-- Shield outer border - gold gradient -->
    <defs>
      <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#F5CE6A;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#B8882A;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="glowGrad" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%" style="stop-color:#FFE97A;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Shield shape filled dark (matches site bg) -->
    <path d="M72 4 L136 28 L136 80 Q136 128 72 148 Q8 128 8 80 L8 28 Z"
          fill="#0D1020" stroke="url(#goldGrad)" stroke-width="4"/>

    <!-- Circuit bulb body -->
    <!-- Bulb circle -->
    <circle cx="72" cy="72" r="22" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>

    <!-- Bulb bottom base lines -->
    <line x1="63" y1="94" x2="63" y2="100" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="81" y1="94" x2="81" y2="100" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="100" x2="84" y2="100" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="106" x2="84" y2="106" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="62" y1="112" x2="82" y2="112" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Circuit branches radiating from bulb -->
    <!-- Top -->
    <line x1="72" y1="50" x2="72" y2="38" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="72" cy="35" r="4" fill="url(#goldGrad)"/>
    <!-- Top-left -->
    <line x1="57" y1="57" x2="47" y2="47" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="44" cy="44" r="4" fill="url(#goldGrad)"/>
    <!-- Top-right -->
    <line x1="87" y1="57" x2="97" y2="47" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="100" cy="44" r="4" fill="url(#goldGrad)"/>
    <!-- Left -->
    <line x1="50" y1="72" x2="38" y2="72" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="72" r="4" fill="url(#goldGrad)"/>
    <!-- Right -->
    <line x1="94" y1="72" x2="106" y2="72" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="109" cy="72" r="4" fill="url(#goldGrad)"/>

    <!-- Center diamond glow -->
    <path d="M72 60 L78 72 L72 84 L66 72 Z" fill="url(#glowGrad)" filter="url(#glow)" opacity="0.95"/>
    <path d="M72 63 L76 72 L72 81 L68 72 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- BrightIQ text -->
  <text x="175" y="80"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="62"
        font-weight="700"
        fill="white"
        letter-spacing="-1">Bright</text>
  <text x="346" y="80"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="62"
        font-weight="700"
        fill="url(#goldGrad)"
        letter-spacing="-1">IQ</text>

  <!-- Divider line + SOLUTIONS -->
  <line x1="175" y1="96" x2="205" y2="96" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
  <line x1="375" y1="96" x2="405" y2="96" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
  <text x="290" y="116"
        font-family="'Arial', sans-serif"
        font-size="18"
        font-weight="600"
        fill="#B8882A"
        text-anchor="middle"
        letter-spacing="6">SOLUTIONS</text>
</svg>
